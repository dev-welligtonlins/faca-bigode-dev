<h2>Endereço</h2>
<form [formGroup]="form">

    <fieldset>
        <legend>Descrição</legend>
        <div class="input-group">
            <!-- <span class="input-group-text icons-background">
                <i class="bi bi-telephone-inbound-fill"></i>
            </span> -->
            <input type="text" formControlName="descricao" id="descricao" class="form-control" placeholder="" required>
        </div>
    </fieldset>
    <div class="duration_and_value">
        <fieldset class="duration">
            <legend>Duração</legend>
            <div class="input-group">
                <!-- <span class="input-group-text icons-background">
                    <i class="bi bi-telephone-inbound-fill"></i>
                </span> -->
                <input type="text" formControlName="duracao" id="duracao" class="form-control" placeholder="" required>
            </div>
        </fieldset>

        <fieldset class="value">
            <legend>Valor</legend>
            <div class="input-group">
                <!-- <span class="input-group-text icons-background">
                    <i class="bi bi-telephone-inbound-fill"></i>
                </span> -->
                <input type="text" formControlName="valor" id="valor" class="form-control" placeholder="" required>
            </div>
        </fieldset>
    </div>
    <fieldset>
        <legend>Corte/Barba</legend>
        <div class="input-group">
            <!-- <span class="input-group-text icons-background">
                <i class="bi bi-telephone-inbound-fill"></i>
            </span> -->
            <input type="text" formControlName="tipo_servico" id="tipo_servico" class="form-control" placeholder=""
                required>
        </div>
    </fieldset>
    <!-- <div class="form-check">
        <input class="form-check-input" type="radio" name="flexRadioDefault" id="flexRadioDefault1">
        <label class="form-check-label" for="flexRadioDefault1">
            Default radio
        </label>
    </div>
    <div class="form-check">

        <label class="form-check-label" for="flexRadioDefault2">
            Default checked radio
        </label>
    </div> -->
</form>
