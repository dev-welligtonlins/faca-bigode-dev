<h2>Servico</h2>
<form [formGroup]="form">

    <fieldset>
        <legend>Descrição</legend>
        <div class="input-group">
            <!-- <span class="input-group-text icons-background">
                <i class="bi bi-telephone-inbound-fill"></i>
            </span> -->
            <input type="text" formControlName="descricao" id="descricao" class="form-control" placeholder="" required>
        </div>
    </fieldset>
    <div class="duration_and_value">
        <fieldset class="duration">
            <legend>Duração</legend>
            <div class="input-group">
                <!-- <span class="input-group-text icons-background">
                    <i class="bi bi-telephone-inbound-fill"></i>
                </span> -->
                <input type="text" formControlName="duracao" id="duracao" class="form-control" placeholder="" required>
            </div>
        </fieldset>

        <fieldset class="value">
            <legend>Valor</legend>
            <div class="input-group">
                <!-- <span class="input-group-text icons-background">
                    <i class="bi bi-telephone-inbound-fill"></i>
                </span> -->
                <input type="text" formControlName="valor" id="valor" class="form-control" placeholder="" required>
            </div>
        </fieldset>
    </div>
    <fieldset>
        <legend>Categoria</legend>
        <div class="tipo-servico">
            <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="inlineRadioOptions" id="inlineRadio1"
                    value="option1">
                <label class="form-check-label" for="inlineRadio1">Cabelo</label>
            </div>
            <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="inlineRadioOptions" id="inlineRadio2"
                    value="option2">
                <label class="form-check-label" for="inlineRadio2">Barba</label>
            </div>
        </div>
    </fieldset>
    <button type="submit">Adicionar +</button>
</form>
<div class="signup-link">Se preferir,
    <span class="create-account">deixar pra depois</span>
</div>
