<h2>Endereço</h2>
<!-- <span class="input-group-text icons-background">
    <i class="bi bi-person-circle"></i>
</span> -->
<form>
    <div class="cep-and-number">
        <fieldset class="cep">
            <legend>Cep</legend>
            <div class="input-group">
                <input type="text" id="cep" class="form-control" placeholder="cep: xxxx-xxx" required>
            </div>
        </fieldset>
        <fieldset class="number">
            <legend>Número</legend>
            <div class="input-group">
                <!-- <span class="input-group-text icons-background">
                    <i class="bi bi-envelope-check-fill"></i>
                </span> -->
                <input type="number" id="number" class="form-control" placeholder="" required>
            </div>
        </fieldset>
    </div>
    <fieldset>
        <legend>Complemento</legend>
        <div class="input-group">
            <!-- <span class="input-group-text icons-background">
                <i class="bi bi-telephone-inbound-fill"></i>
            </span> -->
            <input type="text" id="complement" class="form-control" placeholder="Ex: Sala, AP, Bloco" required>
        </div>
    </fieldset>
    <fieldset>
        <legend>Bairro</legend>
        <div class="input-group">
            <!-- <span class="input-group-text icons-background">
                <i class="bi bi-telephone-inbound-fill"></i>
            </span> -->
            <input type="text" id="neighborhood" class="form-control" placeholder="Bairro" required>
        </div>
    </fieldset>
    <fieldset>
        <legend>Rua</legend>
        <div class="input-group">
            <!-- <span class="input-group-text icons-background">
                <i class="bi bi-telephone-inbound-fill"></i>
            </span> -->
            <input type="text" id="road" class="form-control" placeholder="Rua" required>
        </div>
    </fieldset>
</form>
