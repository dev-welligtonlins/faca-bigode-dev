<h2>Barbeiros</h2>
<form [formGroup]="form">
    <div class="mb-3">
        <label for="imagem" class="form-label">Foto da Barbearia</label>
        <input type="file" class="form-control" id="imagem" accept="image/*" (change)="uploadFile($event)">
    </div>
    <div *ngIf="!preview">
        <img [src]="preview" src="assets/img/3333.jpg" alt="Preview" class="photo-perfil">
    </div>
    <div *ngIf="preview">
        <img [src]="preview" src="assets/img/bigode.png" alt="Preview" class="photo-perfil">
    </div>
    <fieldset>
        <legend>Nome</legend>
        <div class="input-group">
            <!-- <span class="input-group-text icons-background">
                <i class="bi bi-telephone-inbound-fill"></i>
            </span> -->
            <input type="text" formControlName="nome" id="nome" class="form-control" placeholder="" required>
        </div>
    </fieldset>
    <fieldset>
        <legend>Rede social</legend>
        <div class="input-group">
            <!-- <span class="input-group-text icons-background">
                <i class="bi bi-telephone-inbound-fill"></i>
            </span> -->
            <input type="text" formControlName="midia_social" id="midia_social" class="form-control" placeholder=""
                required>
        </div>
    </fieldset>
    <fieldset>
        <legend>Especialidade</legend>
        <div class="tipo-servico">
            <div class="form-check">
                <input class="form-check-input" type="radio" [value]="'cabelo'" formControlName="tipo_servico"
                    id="corte">
                <label class="form-check-label" for="cabelo">Cabelo</label>
            </div>
            <div class="form-check">
                <input class="form-check-input" type="radio" [value]="'barba'" formControlName="tipo_servico"
                    id="barba">
                <label class="form-check-label" for="barba">Barba</label>
            </div>
        </div>
    </fieldset>
    <button type="submit">Adicionar +</button>

</form>
